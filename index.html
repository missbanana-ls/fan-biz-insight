<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAN商业化行业洞察 — 每日动态</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Product+Sans:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font: 'Google Sans', 'Noto Sans SC', 'Segoe UI', system-ui, sans-serif;

      --white: #ffffff;
      --bg: #ffffff;
      --bg-surface: #f8f9fa;
      --bg-hover: #f1f3f4;
      --bg-active: #e8f0fe;

      --text: #202124;
      --text-2: #5f6368;
      --text-3: #80868b;
      --text-4: #bdc1c6;

      --blue: #1a73e8;
      --blue-hover: #1765cc;
      --blue-light: #e8f0fe;
      --blue-pale: #f0f6ff;

      --green: #1e8e3e;
      --green-bg: #e6f4ea;
      --yellow: #f9ab00;
      --yellow-bg: #fef7e0;
      --red: #d93025;
      --red-bg: #fce8e6;
      --teal: #12a4af;
      --teal-bg: #e4f7f7;
      --purple: #8430ce;
      --purple-bg: #f3e8fd;
      --orange: #e8710a;
      --orange-bg: #feefe3;

      --border: #dadce0;
      --border-light: #e8eaed;
      --border-focus: #1a73e8;

      --shadow-1: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
      --shadow-2: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
      --shadow-hover: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);

      --radius: 8px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 100px;

      --ease: cubic-bezier(0.2, 0, 0, 1);
      --max-w: 1200px;
    }

    [data-theme="dark"] {
      --bg: #1f1f1f;
      --bg-surface: #292a2d;
      --bg-hover: #333538;
      --bg-active: #28344a;

      --text: #e8eaed;
      --text-2: #9aa0a6;
      --text-3: #80868b;
      --text-4: #5f6368;

      --blue: #8ab4f8;
      --blue-hover: #aecbfa;
      --blue-light: #28344a;
      --blue-pale: #1d2a3e;

      --green: #81c995;
      --green-bg: #1b3626;
      --yellow: #fdd663;
      --yellow-bg: #3e3012;
      --red: #f28b82;
      --red-bg: #3c2020;
      --teal: #78d9d9;
      --teal-bg: #1a3232;
      --purple: #c58af9;
      --purple-bg: #2d1f3d;
      --orange: #fcad70;
      --orange-bg: #3c2610;

      --white: #1f1f1f;
      --border: #3c4043;
      --border-light: #333538;
      --border-focus: #8ab4f8;

      --shadow-1: 0 1px 3px 0 rgba(0,0,0,0.5), 0 1px 2px 0 rgba(0,0,0,0.3);
      --shadow-2: 0 2px 6px 0 rgba(0,0,0,0.5), 0 4px 12px 4px rgba(0,0,0,0.3);
      --shadow-hover: 0 2px 6px 0 rgba(0,0,0,0.5), 0 4px 12px 4px rgba(0,0,0,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    ::selection { background: var(--blue-light); color: var(--blue); }

    /* ====== TOP NAV ====== */
    .topnav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-light);
      height: 64px;
    }

    .topnav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 24px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 1.125rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .topnav-right {
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      margin-left: auto;
    }

    .nav-tabs {
      display: flex;
      align-items: center;
      gap: 0;
      height: 100%;
    }

    .nav-tab {
      height: 64px;
      padding: 0 20px;
      border: none;
      background: transparent;
      color: var(--text-3);
      font-size: 0.875rem;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      position: relative;
      transition: color 200ms var(--ease);
      display: flex;
      align-items: center;
    }

    .nav-tab:hover { color: var(--text); }

    .nav-tab.active {
      color: var(--text);
    }

    .nav-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20px;
      right: 20px;
      height: 2px;
      background: var(--text);
      border-radius: 1px 1px 0 0;
    }

    .nav-tab:focus-visible { outline: 2px solid var(--border-focus); outline-offset: -2px; }


    /* ====== HERO ====== */
    .hero {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 48px 24px 0;
      text-align: left;
    }

    .hero-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-top: 24px;
    }

    .hero-title {
      font-size: 2.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--text);
    }

    .hero-date-nav {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-surface);
      border-radius: var(--radius-full);
      padding: 4px;
      flex-shrink: 0;
    }

    .hero-date-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 200ms var(--ease);
    }

    .hero-date-btn:hover { background: var(--bg-hover); }
    .hero-date-btn:focus-visible { outline: 2px solid var(--border-focus); outline-offset: 1px; }

    .hero-date-label {
      padding: 0 12px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      user-select: none;
      white-space: nowrap;
    }

    .hero-subtitle {
      margin-top: 12px;
      font-size: 1rem;
      color: var(--text-2);
      font-weight: 400;
      max-width: 560px;
    }

    .hero-stats {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 28px;
    }

    .hero-stat:first-child {
      padding-left: 0;
    }

    .hero-stat-num {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .hero-stat-label {
      font-size: 0.75rem;
      color: var(--text-3);
      font-weight: 500;
      margin-top: 2px;
    }

    .hero-divider {
      width: 1px;
      height: 36px;
      background: var(--border);
    }

    /* ====== FILTERS ====== */
    .filters {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 28px 24px 0;
    }

    .filters-scroll {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .filters-scroll::-webkit-scrollbar { display: none; }

    .chip {
      height: 36px;
      padding: 0 16px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-2);
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      transition: all 200ms var(--ease);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .chip:hover { background: var(--bg-surface); border-color: var(--text-4); }

    .chip.active {
      background: var(--blue-light);
      color: var(--blue);
      border-color: transparent;
    }

    .chip .chip-num {
      font-size: 0.6875rem;
      opacity: 0.5;
    }

    .chip.active .chip-num { opacity: 0.7; }

    /* ====== CONTENT GRID ====== */
    .grid-wrap {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 28px 24px 80px;
    }

    .section-row {
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      padding-bottom: 12px;
      margin-bottom: 4px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* ====== CARD (Material-style) ====== */
    .card {
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: box-shadow 200ms var(--ease), border-color 200ms var(--ease);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
      border-color: var(--border);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card h3 {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.5;
      letter-spacing: -0.005em;
    }

    .card-source {
      flex-shrink: 0;
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-3);
      background: var(--bg-surface);
      padding: 3px 10px;
      border-radius: var(--radius-full);
      white-space: nowrap;
      margin-top: 2px;
    }

    .card-body {
      font-size: 0.8125rem;
      color: var(--text-2);
      line-height: 1.7;
    }

    .card-insight {
      background: var(--bg-surface);
      border-radius: var(--radius);
      padding: 12px 14px;
    }

    .card-insight-label {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
      margin-bottom: 3px;
    }

    .card-insight-text {
      font-size: 0.8125rem;
      color: var(--text-2);
      line-height: 1.6;
    }

    .card-ime {
      background: var(--bg-surface);
      border-radius: var(--radius);
      padding: 12px 14px;
    }

    .card-ime-label {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
      margin-bottom: 3px;
    }

    .card-ime-text {
      font-size: 0.8125rem;
      color: var(--text-2);
      line-height: 1.6;
    }

    .card-foot {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: auto;
      padding-top: 4px;
    }

    .card-tag {
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: 0.6875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 150ms var(--ease);
      background: var(--bg-surface);
      color: var(--text-2);
      border: 1px solid var(--border-light);
    }

    .card-tag:hover { background: var(--bg-hover); color: var(--text); }

    .card-priority {
      margin-left: auto;
      font-size: 0.625rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text-4);
    }

    .card-priority .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .card-priority.high { color: var(--red); }
    .card-priority.high .dot { background: var(--red); }
    .card-priority.medium { color: var(--yellow); }
    .card-priority.medium .dot { background: var(--yellow); }
    .card-priority.normal { color: var(--text-4); }
    .card-priority.normal .dot { background: var(--text-4); }

    /* ====== EMPTY ====== */
    .empty {
      text-align: center;
      padding: 80px 24px;
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--bg-surface);
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-4);
    }

    .empty-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-2);
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 0.875rem;
      color: var(--text-3);
      max-width: 340px;
      margin: 0 auto;
    }

    /* ====== FOOTER ====== */
    .footer {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 24px 40px;
      text-align: center;
    }

    .footer-line {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 20px;
    }

    .footer-text {
      font-size: 0.75rem;
      color: var(--text-4);
    }

    /* ====== SCROLL TOP ====== */
    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-1);
      opacity: 0;
      transform: translateY(12px);
      transition: all 300ms var(--ease);
      pointer-events: none;
      z-index: 50;
    }

    .scroll-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .scroll-top:hover { box-shadow: var(--shadow-2); background: var(--bg-surface); }
    .scroll-top:focus-visible { outline: 2px solid var(--border-focus); outline-offset: 2px; }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 768px) {
      .topnav-inner { padding: 0 16px; gap: 12px; }
      .hero { padding: 32px 16px 0; }
      .hero-title { font-size: 2rem; }
      .hero-subtitle { font-size: 0.875rem; }
      .hero-top { flex-direction: column; gap: 12px; }
      .hero-stats { gap: 0; }
      .hero-stat { padding: 0 16px; }
      .hero-stat-num { font-size: 1.25rem; }
      .filters { padding: 20px 16px 0; }
      .grid-wrap { padding: 20px 16px 64px; }
      .cards { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .nav-tab { padding: 0 12px; font-size: 0.8125rem; }
      .hero-title { font-size: 1.5rem; }
      .hero-stat { padding: 0 12px; }
      .hero-stats { flex-wrap: wrap; }
    }
  </style>
</head>

// ============================================================
// STATE
// ============================================================
let currentDate = new Date(2026, 3, 18);
let activeTag = null;
let searchQuery = '';

const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];

function fmtKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getDayNews() { return NEWS_DATA[fmtKey(currentDate)] || []; }

// ============================================================
// DATE
// ============================================================
function changeDate(delta) {
  currentDate.setDate(currentDate.getDate() + delta);
  activeTag = null;
  render();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  renderHero();
  renderFilters();
  renderContent();
}

function renderHero() {
  const d = currentDate;
  const m = d.getMonth() + 1, day = d.getDate(), wd = WEEKDAYS[d.getDay()];
  const news = getDayNews();
  const high = news.filter(n => n.priority === 'high').length;
  const tags = new Set(); news.forEach(n => n.tags.forEach(t => tags.add(t)));

  const wdShort = ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];

  document.getElementById('hero').innerHTML = `
    <h1 class="hero-title">${m}月${day}日商业化洞察</h1>
    <p class="hero-subtitle">每日精选互联网商业化领域最值得关注的动态，助你快速掌握行业脉搏</p>
    <div class="hero-top">
      <div class="hero-stats">
        <div class="hero-stat"><span class="hero-stat-num">${news.length}</span><span class="hero-stat-label">条资讯</span></div>
        <div class="hero-divider"></div>
        <div class="hero-stat"><span class="hero-stat-num">${high}</span><span class="hero-stat-label">高关注</span></div>
        <div class="hero-divider"></div>
        <div class="hero-stat"><span class="hero-stat-num">${tags.size}</span><span class="hero-stat-label">个领域</span></div>
      </div>
      <div class="hero-date-nav">
        <button class="hero-date-btn" onclick="changeDate(-1)" aria-label="前一天">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="hero-date-label">${d.getFullYear()}年${m}月${day}日 ${wdShort}</span>
        <button class="hero-date-btn" onclick="changeDate(1)" aria-label="后一天">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  `;
}

function renderFilters() {
  const news = getDayNews();
  const counts = {};
  news.forEach(n => n.tags.forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);

  let h = `<button class="chip ${activeTag === null ? 'active' : ''}" onclick="filterByTag(null)">全部 <span class="chip-num">${news.length}</span></button>`;
  sorted.forEach(([tag, c]) => {
    h += `<button class="chip ${activeTag === tag ? 'active' : ''}" onclick="filterByTag('${tag}')">${tag} <span class="chip-num">${c}</span></button>`;
  });
  document.getElementById('filterRow').innerHTML = h;
}

function filterByTag(tag) {
  activeTag = activeTag === tag ? null : tag;
  renderFilters();
  renderContent();
}

function renderContent() {
  const main = document.getElementById('mainContent');
  let news = getDayNews();

  if (activeTag) news = news.filter(n => n.tags.includes(activeTag));
  if (searchQuery) {
    news = news.filter(n =>
      n.title.toLowerCase().includes(searchQuery) ||
      n.summary.toLowerCase().includes(searchQuery) ||
      n.reason.toLowerCase().includes(searchQuery) ||
      (n.imeInsight && n.imeInsight.toLowerCase().includes(searchQuery)) ||
      n.tags.some(t => t.toLowerCase().includes(searchQuery))
    );
  }

  if (!news.length && !getDayNews().length) {
    main.innerHTML = `<div class="empty"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7"/><path d="M16 3H8l-5 4h18l-5-4z"/></svg></div><div class="empty-title">暂无当日资讯</div><div class="empty-desc">当天没有收录商业化资讯，请切换到其他日期查看</div></div>`;
    return;
  }
  if (!news.length) {
    main.innerHTML = `<div class="empty"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></div><div class="empty-title">没有匹配结果</div><div class="empty-desc">请调整筛选标签或搜索关键词</div></div>`;
    return;
  }

  // group
  const groups = {};
  news.forEach(n => { const p = n.tags[0]; if (!groups[p]) groups[p] = []; groups[p].push(n); });
  const sg = Object.entries(groups).sort((a,b) => b[1].length - a[1].length);

  let h = '';
  sg.forEach(([tag, items]) => {
    h += `<section class="section-row"><div class="section-title">${tag} · ${items.length}</div><div class="cards">`;
    items.forEach(n => { h += renderCard(n); });
    h += '</div></section>';
  });
  main.innerHTML = h;
}

function renderCard(n) {
  const pl = { high: '高关注', medium: '中关注', normal: '关注' };
  return `
    <article class="card">
      <div class="card-header">
        <h3>${n.title}</h3>
        <span class="card-source">${n.source}</span>
      </div>
      <p class="card-body">${n.summary}</p>
      <div class="card-insight">
        <div class="card-insight-label">值得关注</div>
        <p class="card-insight-text">${n.reason}</p>
      </div>
      ${n.imeInsight ? `<div class="card-ime">
        <div class="card-ime-label">输入法启示</div>
        <p class="card-ime-text">${n.imeInsight}</p>
      </div>` : ''}
      <div class="card-foot">
        ${n.tags.map(t => `<span class="card-tag" onclick="filterByTag('${t}')">${t}</span>`).join('')}
        <span class="card-priority ${n.priority}"><span class="dot"></span>${pl[n.priority]}</span>
      </div>
    </article>`;
}

// ============================================================
// SCROLL TOP
// ============================================================
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 400);
});

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' && !e.target.closest('input')) changeDate(-1);
  if (e.key === 'ArrowRight' && !e.target.closest('input')) changeDate(1);
  if ((e.key === '/' || e.key === 'k') && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
