<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font: 'Noto Sans SC', 'Segoe UI', system-ui, sans-serif;
      --bg: #ffffff;
      --bg-surface: #f8f9fa;
      --bg-hover: #f1f3f4;
      --text: #202124;
      --text-2: #5f6368;
      --text-3: #80868b;
      --text-4: #bdc1c6;
      --border: #dadce0;
      --border-light: #e8eaed;
      --blue: #1a73e8;
      --blue-light: #e8f0fe;
      --shadow-hover: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
      --radius: 8px;
      --radius-lg: 12px;
      --radius-full: 100px;
      --ease: cubic-bezier(0.2, 0, 0, 1);
      --max-w: 1200px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; }

    /* NAV — 与index.html保持一致 */
    .topnav {
      position: sticky; top: 0; z-index: 100;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-light); height: 64px;
    }
    .topnav-inner {
      max-width: var(--max-w); margin: 0 auto; padding: 0 24px;
      height: 100%; display: flex; align-items: center; gap: 24px;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .brand-name { font-size: 1.125rem; font-weight: 500; color: var(--text); letter-spacing: -0.01em; }
    .topnav-right { display: flex; align-items: center; gap: 0; flex-shrink: 0; margin-left: auto; }
    .nav-tabs { display: flex; align-items: center; gap: 0; height: 100%; }
    .nav-tab {
      height: 64px; padding: 0 20px; border: none; background: transparent;
      color: var(--text-3); font-size: 0.875rem; font-weight: 500;
      font-family: var(--font); cursor: pointer; position: relative;
      transition: color 200ms var(--ease); display: flex; align-items: center;
      text-decoration: none;
    }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { color: var(--text); }
    .nav-tab.active::after {
      content: ''; position: absolute; bottom: 0; left: 20px; right: 20px;
      height: 2px; background: var(--text); border-radius: 1px 1px 0 0;
    }

    /* HERO */
    .hero {
      max-width: var(--max-w); margin: 0 auto; padding: 48px 24px 0; text-align: left;
    }
    .hero-title { font-size: 2.75rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.15; color: var(--text); }
    .hero-subtitle { margin-top: 12px; font-size: 1rem; color: var(--text-2); max-width: 640px; }

    /* FILTER */
    .filters { max-width: var(--max-w); margin: 0 auto; padding: 28px 24px 0; }
    .filters-scroll { display: flex; align-items: center; gap: 8px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .filters-scroll::-webkit-scrollbar { display: none; }
    .chip {
      height: 36px; padding: 0 16px; border-radius: var(--radius-full);
      border: 1px solid var(--border); background: var(--bg); color: var(--text-2);
      font-size: 0.8125rem; font-weight: 500; font-family: var(--font);
      cursor: pointer; transition: all 200ms var(--ease); white-space: nowrap;
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .chip:hover { background: var(--bg-surface); border-color: var(--text-4); }
    .chip.active { background: var(--blue-light); color: var(--blue); border-color: transparent; }
    .chip .chip-num { font-size: 0.6875rem; opacity: 0.5; }
    .chip.active .chip-num { opacity: 0.7; }

    /* MASONRY GRID */
    .gallery {
      max-width: var(--max-w); margin: 0 auto; padding: 24px 24px 80px;
      columns: 3; column-gap: 16px;
    }

    .gallery-card {
      break-inside: avoid; margin-bottom: 16px;
      border: 1px solid var(--border-light); border-radius: var(--radius-lg);
      overflow: hidden; background: var(--bg);
      transition: box-shadow 200ms var(--ease), border-color 200ms var(--ease);
    }
    .gallery-card:hover { box-shadow: var(--shadow-hover); border-color: var(--border); }

    .gallery-img {
      width: 100%; display: block;
      background: var(--bg-surface);
      min-height: 160px;
      object-fit: cover;
    }

    .gallery-img-placeholder {
      width: 100%; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--bg-surface) 0%, var(--border-light) 100%);
      color: var(--text-4); font-size: 2rem; min-height: 200px;
    }

    .gallery-info { padding: 14px 16px; }

    .gallery-title {
      font-size: 0.875rem; font-weight: 500; color: var(--text);
      line-height: 1.5; margin-bottom: 6px;
    }

    .gallery-desc {
      font-size: 0.75rem; color: var(--text-3); line-height: 1.6; margin-bottom: 10px;
    }

    .gallery-meta {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; flex-wrap: wrap;
    }

    .gallery-tags { display: flex; gap: 4px; flex-wrap: wrap; }

    .gallery-tag {
      padding: 2px 8px; border-radius: var(--radius-full);
      background: var(--bg-surface); color: var(--text-3); border: 1px solid var(--border-light);
      font-size: 0.625rem; font-weight: 500; cursor: pointer;
      transition: all 150ms var(--ease);
    }
    .gallery-tag:hover { background: var(--bg-hover); color: var(--text-2); }

    .gallery-source {
      font-size: 0.625rem; color: var(--text-4); flex-shrink: 0;
    }

    /* EMPTY */
    .empty { text-align: center; padding: 80px 24px; }
    .empty-title { font-size: 1rem; font-weight: 500; color: var(--text-2); margin-bottom: 8px; }
    .empty-desc { font-size: 0.875rem; color: var(--text-3); max-width: 340px; margin: 0 auto; }

    /* FOOTER */
    .footer { max-width: var(--max-w); margin: 0 auto; padding: 0 24px 40px; text-align: center; }
    .footer-line { width: 40px; height: 1px; background: var(--border); margin: 0 auto 20px; }
    .footer-text { font-size: 0.75rem; color: var(--text-4); }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .gallery { columns: 2; padding: 16px 16px 64px; }
      .hero { padding: 32px 16px 0; }
      .hero-title { font-size: 2rem; }
      .filters { padding: 20px 16px 0; }
    }
    @media (max-width: 480px) {
      .gallery { columns: 1; }
      .nav-tab { padding: 0 12px; font-size: 0.8125rem; }
      .hero-title { font-size: 1.5rem; }
    }
  </style>
</head>

    tags: ["电商大促", "优惠券"],

// TAGS
const ALL_TAGS = [...new Set(CASES.flatMap(c => c.tags))];
let activeTag = null;

function renderFilters() {
  const el = document.getElementById('filterRow');
  let h = `<button class="chip ${activeTag === null ? 'active' : ''}" onclick="filterTag(null)">全部 <span class="chip-num">${CASES.length}</span></button>`;
  ALL_TAGS.forEach(tag => {
    const count = CASES.filter(c => c.tags.includes(tag)).length;
    h += `<button class="chip ${activeTag === tag ? 'active' : ''}" onclick="filterTag('${tag}')">${tag} <span class="chip-num">${count}</span></button>`;
  });
  el.innerHTML = h;
}

function filterTag(tag) {
  activeTag = activeTag === tag ? null : tag;
  renderFilters();
  renderGallery();
}

function renderGallery() {
  const el = document.getElementById('gallery');
  let items = CASES;
  if (activeTag) items = items.filter(c => c.tags.includes(activeTag));

  if (!items.length) {
    el.innerHTML = `<div class="empty" style="column-span:all"><div class="empty-title">没有匹配结果</div><div class="empty-desc">请调整筛选标签</div></div>`;
    return;
  }

  el.innerHTML = items.map(c => `
    <div class="gallery-card">
      <a href="${c.pin || '#'}" target="_blank" rel="noopener noreferrer" style="display:block;">
        <img class="gallery-img" src="${c.img}" alt="${c.title}" loading="lazy" onerror="this.style.display='none'"/>
      </a>
      <div class="gallery-info">
        <div class="gallery-title">${c.title}</div>
        <div class="gallery-desc">${c.desc}</div>
        <div class="gallery-meta">
          <div class="gallery-tags">
            ${c.tags.map(t => `<span class="gallery-tag" onclick="filterTag('${t}')">${t}</span>`).join('')}
          </div>
          <span class="gallery-source">${c.source}</span>
        </div>
      </div>
    </div>
  `).join('');
}

renderFilters();
renderGallery();
</script>
